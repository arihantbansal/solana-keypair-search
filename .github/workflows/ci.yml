name: CI

# Triggers only on pushes/PRs targeting main. No untrusted input from issue
# titles, PR bodies, comments, etc. is read by any step in this workflow,
# so command-injection via `github.event.*` interpolation is not a concern.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck + lint + format + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match the `packageManager` field in package.json.
          # Bumping this should be a deliberate change committed in the same PR.
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all checks
        run: bun run check
